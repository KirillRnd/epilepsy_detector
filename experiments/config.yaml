# Конфигурационный файл для эксперимента по детектированию эпилепсии

# Параметры данных
data:
  data_dir: "data/processed"
  window_length: 2000  # 5 секунд при 400 Гц
  batch_size: 64
  overlap: 0.5
  train_animal_ratio: 0.7
  val_animal_ratio: 0.15

# Параметры модели
model:
  input_channels: 4
  window_length: 2000
  num_classes: 2
  dropout_rate: 0.5
  use_improved_architecture: false
  class_weights: [1.0, 3.0]  # Веса для нормы и приступов

# Параметры обучения
training:
  learning_rate: 0.001
  num_epochs: 100
  weight_decay: 1e-4
  patience: 10

# Параметры эксперимента
experiment:
  seed: 42
  device: "cuda"  # или "cpu"
  output_dir: "experiments/exp_001"
  checkpoint_dir: "experiments/exp_001/checkpoints"
  log_dir: "experiments/exp_001/logs"