# Конфигурационный файл для эксперимента с улучшенной архитектурой

# Параметры данных
data:
  data_dir: "data/processed"
  window_length: 2000  # 5 секунд при 400 Гц
  batch_size: 32
  overlap: 0.5
  train_animal_ratio: 0.7
  val_animal_ratio: 0.15

# Параметры модели
model:
  input_channels: 4
  window_length: 2000
  num_classes: 2
  dropout_rate: 0.3
  use_improved_architecture: true
  class_weights: [1.0, 3.0]  # Веса для нормы и приступов

# Параметры обучения
training:
  learning_rate: 0.0005
  num_epochs: 150
  weight_decay: 1e-5
  patience: 15

# Параметры эксперимента
experiment:
  seed: 42
  device: "cuda"  # или "cpu"
  output_dir: "experiments/improved_exp_001"
  checkpoint_dir: "experiments/improved_exp_001/checkpoints"
  log_dir: "experiments/improved_exp_001/logs"