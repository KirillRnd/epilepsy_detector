version: '3.8'

services:
  epilepsy-detector:
    image: nvcr.io/nvidia/pytorch:25.05-py3
    container_name: epilepsy-detector
    ports:
      - "8888:8888"
    volumes:
      - type: bind
        source: .
        target: /workspace/Epilepsy
      - type: bind
        source: /mnt/wslg/.X11-unix
        target: /tmp/.X11-unix
    working_dir: /workspace/Epilepsy
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=:0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: bash