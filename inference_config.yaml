# Конфигурация для инференса детектора эпилепсии
# Использование: python inference.py --edf recording.edf --config inference_config.yaml

model_name: RDSCBiGRUDetector
checkpoint: experiments/exp_002/checkpoints/RDSCBiGRUDetector-best-val_loss=0.00101.ckpt

# Параметры скользящего окна
window_length: 2000        # отсчётов (5 сек при 400 Гц)
step: 1000                 # шаг слайдинга (50% перекрытие)

# Параметры препроцессинга
target_sr: 400             # целевая частота дискретизации (Гц)
bandpass_low: 1.0          # нижняя граница полосового фильтра (Гц)
bandpass_high: 100.0       # верхняя граница полосового фильтра (Гц)
notch_freq: 50.0           # частота режекторного фильтра (Гц)

# Пороги для гистерезисной бинаризации
onset_threshold: 0.3       # порог начала приступа (onset)
offset_threshold: 0.15     # порог конца приступа (offset)

# Постобработка
min_duration_s: 3.0        # минимальная длительность сегмента (сек)
min_gap_s: 2.0             # минимальный зазор для слияния (сек)
collar_s: 0.0              # расширение границ (сек, 0 = выключено)

# Выходной файл
output: seizures.txt       # путь к выходному файлу

# Параметры инференса
batch_size: 64             # размер батча для модели
device: cuda               # устройство (cuda/cpu), автоматически определяется если не задано